<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Scroll Experience</title>
    <!-- GSAP Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');

        :root {
            --bg: #050505;
            --primary: #00f2ff;
            --accent: #ff0055;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Custom Cursor */
        #cursor {
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        section {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Hero Section */
        .hero-title {
            font-size: 15vw;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.8;
            z-index: 2;
            text-align: center;
        }

        .hero-image {
            position: absolute;
            width: 40%;
            z-index: 1;
            filter: grayscale(100%) brightness(0.7);
        }

        /* Horizontal Scroll Section */
        .horizontal-container {
            display: flex;
            width: 300vw;
            /* 3 screens wide */
            height: 100vh;
        }

        .panel {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel h2 {
            font-size: 5rem;
        }

        /* Zoom/Portal Section */
        .zoom-section {
            background: var(--primary);
            color: black;
        }

        .zoom-circle {
            width: 100px;
            height: 100px;
            background: var(--bg);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .footer {
            height: 50vh;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .reveal-text {
            font-size: 2rem;
            opacity: 0;
        }
    </style>
</head>

<body>

    <div id="cursor"></div>

    <!-- 1. HERO WITH LAYERED PARALLAX -->
    <section class="hero">
        <h1 class="hero-title">BEYOND<br><span style="color: var(--primary)">DEPTH</span></h1>
        <!-- Using a placeholder space image -->
        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=800"
            class="hero-image" alt="mountain">
    </section>

    <!-- 2. THE HORIZONTAL JOURNEY (Pinned) -->
    <div class="horizontal-wrapper">
        <div class="horizontal-container">
            <section class="panel" style="background: #080808;">
                <h2>01. EXPLORE</h2>
                <p>Scroll down to move sideways.</p>
            </section>
            <section class="panel" style="background: #111;">
                <h2>02. INTERACT</h2>
                <p>Smooth transitions via GSAP.</p>
            </section>
            <section class="panel" style="background: var(--accent);">
                <h2>03. CREATE</h2>
                <p>The end of the horizontal track.</p>
            </section>
        </div>
    </div>

    <!-- 3. ZOOM PORTAL EFFECT -->
    <section class="zoom-section">
        <div class="zoom-circle">
            <h2 style="color: white; font-size: 0.5rem;" class="zoom-inner-text">KEEP<br>SCROLLING</h2>
        </div>
    </section>

    <footer class="footer">
        <h2 class="reveal-text">PROJECT COMPLETE</h2>
        <p>Interactive Parallax 2.0</p>
    </footer>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. Custom Cursor Logic
        const cursor = document.getElementById('cursor');
        window.addEventListener('mousemove', (e) => {
            gsap.to(cursor, {
                x: e.clientX,
                y: e.clientY,
                duration: 0.2
            });
        });

        // 2. Hero Parallax (Text and Image move differently)
        gsap.to(".hero-title", {
            scrollTrigger: {
                trigger: ".hero",
                start: "top top",
                scrub: 1
            },
            y: 200,
            scale: 0.8,
            opacity: 0
        });

        gsap.to(".hero-image", {
            scrollTrigger: {
                trigger: ".hero",
                start: "top top",
                scrub: 1
            },
            y: -150,
            scale: 1.2,
            rotate: 5
        });

        // 3. Horizontal Scroll Logic
        let sections = gsap.utils.toArray(".panel");
        gsap.to(sections, {
            xPercent: -100 * (sections.length - 1),
            ease: "none",
            scrollTrigger: {
                trigger: ".horizontal-wrapper",
                pin: true,
                scrub: 1,
                snap: 1 / (sections.length - 1),
                end: () => "+=" + document.querySelector(".horizontal-container").offsetWidth
            }
        });

        // 4. Zoom Portal Animation
        gsap.to(".zoom-circle", {
            scrollTrigger: {
                trigger: ".zoom-section",
                start: "top top",
                end: "bottom top",
                pin: true,
                scrub: 1
            },
            scale: 40, // Blows the circle up to cover the screen
            duration: 1
        });

        // 5. Footer Reveal
        gsap.to(".reveal-text", {
            scrollTrigger: {
                trigger: ".footer",
                start: "top 80%",
                toggleActions: "play none none reverse"
            },
            opacity: 1,
            y: -20,
            duration: 1
        });
    </script>
</body>

</html>
